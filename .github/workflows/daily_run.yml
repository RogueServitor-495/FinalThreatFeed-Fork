name: Daily Run

on:
  schedule:
    # 每天UTC时间0点运行（北京时间早上8点）
    - cron: '0 0 * * *'
  # 允许手动触发
  workflow_dispatch:

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v3
    
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'
        cache: 'pip'
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
    
    - name: Run FinalThreatFeed
      env:
          GEMINI_API_KEY: ${{ secrets.GOOGLE_GEMINI }}
      run: python main.py 
    
    - name: Commit and push changes
      run: |
        git config user.name "github-actions[bot]"
        git config user.email "github-actions[bot]@users.noreply.github.com"
        git add README.md output/*
        git diff --staged --quiet || git commit -m "Update threat feed data"
        git push
        
    - name: Upload to Ctyun OBS
      env:
          AWS_ACCESS_KEY_ID: ${{ secrets.CTYUN_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.CTYUN_SECRET_ACCESS_KEY }}
      run: |
          aws s3 cp output/labeled_threat_threat.csv \
            s3://${{ secrets.CTYUN_BUCKET }}/threat-feed/labeled_threat_threat.csv \
            --endpoint-url ${{ secrets.CTYUN_ENDPOINT }} \
            --no-verify-ssl
